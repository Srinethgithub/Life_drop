services:
  mongo:
    image: mongo:7
    container_name: lifedrop-mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    image: srinethdockerhub/lifedrop-backend:latest
    container_name: lifedrop-backend
    restart: always
    depends_on:
      - mongo
    environment:
      MONGO_URI: mongodb://mongo:27017/lifedrop
      JWT_SECRET: your_super_secret_key_here
      PORT: 5000
      NODE_ENV: production
    ports:
      - "5000:5000"

  frontend:
    image: srinethdockerhub/lifedrop-frontend:latest
    container_name: lifedrop-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "3000:80"

  nginx:
    image: nginx:1.25-alpine
    container_name: lifedrop-nginx
    restart: always
    depends_on:
      - frontend
      - backend
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  mongo_data:
